services:
  - type: web
    name: ug-county-attachment-application-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DISPLAY_TIMEZONE
        value: Africa/Nairobi
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_MAX_AGE_HOURS
        value: "12"
      - key: FILE_STORAGE_PROVIDER
        value: local
      - key: ADMIN_PORTAL_PATH
        value: /staff-portal
      - key: HR_PORTAL_PATH
        value: /hr-portal
      - key: HR_USERNAME
        value: hr_admin
      - key: HR_PASSWORD
        sync: false
      - key: PRESENTATION_LOGIN_USERNAME
        sync: false
      - key: PRESENTATION_LOGIN_PASSWORD
        sync: false
      - key: DEFAULT_DEPARTMENT_ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: attachment-application-system
      - key: ALLOW_ANY_TEST_UPLOADS
        value: "false"
